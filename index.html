<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>AXON - نظام إدارة المبيعات</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Cairo', sans-serif;
  background: #f0f2f5;
  direction: rtl;
  min-height: 100vh;
  position: relative;
}

/* العلامة المائية (لوجو العميل في الخلفية) */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: url('logo-client.png') center center no-repeat;
  background-size: 300px;
  opacity: 0.1;
  pointer-events: none;
  z-index: 0;
}

/* شاشة الدخول */
.login-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, #f5f7fa, #e9ecef);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.login-card {
  background: white;
  border-radius: 28px;
  padding: 45px 35px;
  width: 380px;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.08);
  position: relative;
  z-index: 1;
}

.login-logo {
  width: 100px;
  height: 100px;
  margin: 0 auto 15px;
  background: #f39c12;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 5px 15px rgba(243,156,18,0.3);
}

.login-logo span {
  font-size: 48px;
  font-weight: 900;
  color: white;
}

.login-card h1 {
  font-size: 1.6rem;
  font-weight: 900;
  color: #f39c12;
  margin-top: 10px;
}

.login-card .sub {
  color: #6c757d;
  margin-top: 5px;
  font-size: 0.8rem;
}

.login-card input {
  width: 100%;
  padding: 14px;
  margin: 15px 0 10px;
  background: #f8f9fa;
  border: 1px solid #ddd;
  border-radius: 12px;
  text-align: center;
  outline: none;
  font-size: 1rem;
}

.login-card input:focus {
  border-color: #f39c12;
}

.login-card button {
  width: 100%;
  padding: 14px;
  background: #f39c12;
  border: none;
  border-radius: 12px;
  font-weight: 700;
  cursor: pointer;
  color: white;
  font-size: 1rem;
  transition: 0.2s;
}

.login-card button:hover {
  background: #e67e22;
}

.login-err {
  color: #e74c3c;
  margin-top: 10px;
}

/* النظام الداخلي */
.main-app {
  display: none;
  background: transparent;
  min-height: 100vh;
  position: relative;
  z-index: 1;
}

.topbar {
  background: white;
  border-bottom: 1px solid #e0e0e0;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  position: relative;
  z-index: 2;
}

.topbar-logo {
  display: flex;
  align-items: center;
  gap: 12px;
}

.client-logo-small {
  width: 45px;
  height: 45px;
  background: #2c3e50;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.client-logo-small span {
  font-size: 22px;
  font-weight: 900;
  color: #f39c12;
}

.company-name {
  font-size: 1rem;
  font-weight: 900;
  color: #1a1a2e;
}

.company-sub {
  font-size: 0.65rem;
  color: #6c757d;
}

.user-info {
  display: flex;
  align-items: center;
  gap: 15px;
}

.badge-role {
  padding: 4px 12px;
  border-radius: 20px;
  background: #e9ecef;
  color: #f39c12;
  font-weight: 600;
  font-size: 0.8rem;
}

.btn-logout {
  background: transparent;
  border: 1px solid #ddd;
  padding: 6px 14px;
  border-radius: 8px;
  cursor: pointer;
}

.navtabs {
  background: white;
  border-bottom: 1px solid #e0e0e0;
  display: flex;
  gap: 4px;
  padding: 8px 24px;
  overflow-x: auto;
  position: relative;
  z-index: 2;
}

.navtab {
  padding: 8px 18px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  color: #6c757d;
  background: transparent;
  border: none;
}

.navtab.active {
  background: #f39c12;
  color: white;
}

.content {
  padding: 24px;
  position: relative;
  z-index: 2;
}

.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}

.stat-card {
  background: white;
  border: 1px solid #e0e0e0;
  border-radius: 16px;
  padding: 20px;
  text-align: center;
}

.stat-card .stat-val {
  font-size: 1.6rem;
  font-weight: 900;
  margin: 6px 0 4px;
}

.stat-card .stat-lbl {
  color: #6c757d;
  font-size: 0.85rem;
}

.section {
  background: white;
  border: 1px solid #e0e0e0;
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
}

.section-title {
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.form-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
  margin-bottom: 12px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.form-group label {
  font-size: 0.82rem;
  color: #6c757d;
  font-weight: 600;
}

.form-group input,
.form-group select {
  padding: 10px;
  background: #f8f9fa;
  border: 1px solid #ddd;
  border-radius: 8px;
  outline: none;
}

.btn {
  padding: 10px 20px;
  border-radius: 8px;
  font-weight: 700;
  cursor: pointer;
  border: none;
}

.btn-primary {
  background: #f39c12;
  color: white;
}

.btn-success {
  background: #27ae60;
  color: white;
}

.btn-danger {
  background: #e74c3c;
  color: white;
}

.btn-info {
  background: #3498db;
  color: white;
}

.btn-sm {
  padding: 5px 12px;
  font-size: 0.8rem;
}

.btn-row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 12px;
}

.tbl-wrap {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.88rem;
}

th {
  background: #f8f9fa;
  padding: 12px;
  text-align: right;
  border-bottom: 2px solid #ddd;
}

td {
  padding: 12px;
  border-bottom: 1px solid #eee;
}

.inv-item-row {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr auto;
  gap: 8px;
  margin-bottom: 8px;
  align-items: center;
}

.inv-total-box {
  background: #f8f9fa;
  border-radius: 12px;
  padding: 14px 18px;
  display: flex;
  justify-content: flex-end;
  gap: 30px;
}

.inv-total-box .val {
  font-size: 1.2rem;
  font-weight: 900;
  color: #f39c12;
}

.empty-state {
  text-align: center;
  padding: 50px;
  color: #6c757d;
}
</style>
</head>
<body>

<!-- شاشة الدخول -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <span>A</span>
    </div>
    <h1>AXON</h1>
    <div class="sub">نظام إدارة المبيعات | الريال السعودي</div>
    <input type="password" id="loginPass" placeholder="كلمة السر" onkeypress="if(event.key==='Enter') checkLogin()">
    <button onclick="checkLogin()">دخول</button>
    <div id="loginError" class="login-err"></div>
  </div>
</div>

<!-- النظام الداخلي -->
<div id="mainApp" class="main-app">
  <div class="topbar">
    <div class="topbar-logo">
      <div class="client-logo-small">
        <span>B</span>
      </div>
      <div>
        <div class="company-name">BADRAN MACHINERY CO.</div>
        <div class="company-sub">SMART MACHINERY SOLUTIONS</div>
      </div>
    </div>
    <div class="user-info">
      <span class="badge-role" id="userRoleBadge"></span>
      <button class="btn-logout" onclick="logout()">خروج</button>
    </div>
  </div>
  <div class="navtabs" id="navTabs"></div>
  <div class="content" id="contentArea"></div>
</div>
