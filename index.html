<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXON - نظام إدارة المبيعات</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background:#1a1a2e; direction:rtl; min-height:100vh; display:flex; align-items:center; justify-content:center; }
.login-box { background:#fff; padding:40px; border-radius:20px; width:360px; text-align:center; box-shadow:0 10px 30px rgba(0,0,0,0.2); }
.login-box h1 { color:#f39c12; font-size:2rem; margin-bottom:10px; }
.login-box p { color:#666; margin-bottom:25px; }
.login-box input { width:100%; padding:14px; margin:10px 0; border:2px solid #ddd; border-radius:10px; font-size:16px; text-align:center; outline:none; }
.login-box input:focus { border-color:#f39c12; }
.login-box button { width:100%; padding:14px; background:#f39c12; color:#fff; border:none; border-radius:10px; font-weight:bold; font-size:16px; cursor:pointer; }
.login-box button:hover { background:#e67e22; }
.error-msg { color:#e74c3c; margin-top:15px; font-size:14px; }
</style>
</head>
<body>

<div class="login-box">
  <h1>🔷 AXON</h1>
  <p>نظام إدارة المبيعات</p>
  <input type="password" id="loginPass" placeholder="كلمة السر" autofocus>
  <button id="loginBtn">دخول</button>
  <div id="errorMsg" class="error-msg"></div>
</div>

<script>
// الباسوردات الصحيحة
const USER_PASS = "1234";
const ADMIN_PASS = "admin123";

const passInput = document.getElementById('loginPass');
const loginBtn = document.getElementById('loginBtn');
const errorDiv = document.getElementById('errorMsg');

// دالة تسجيل الدخول
function checkLogin() {
  const pass = passInput.value.trim();
  
  if (pass === ADMIN_PASS) {
    alert("✅ مرحباً أيها الأدمن!");
    errorDiv.innerText = "";
    // هنا هضيف باقي النظام بعدين
  } 
  else if (pass === USER_PASS) {
    alert("✅ مرحباً أيها المستخدم!");
    errorDiv.innerText = "";
    // هنا هضيف باقي النظام بعدين
  } 
  else {
    errorDiv.innerText = "❌ كلمة سر خاطئة";
    passInput.value = "";
    passInput.focus();
  }
}

// دخول بـ Enter
passInput.addEventListener('keypress', function(event) {
  if (event.key === 'Enter') {
    event.preventDefault();
    checkLogin();
  }
});

// دخول بضغط الزر
loginBtn.addEventListener('click', checkLogin);
</script>
</body>
</html>
